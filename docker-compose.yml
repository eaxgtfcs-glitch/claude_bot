services:
  claude-bot:
    build: .
    container_name: claude-telegram-bot
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      # Рабочая папка — проекты которые редактирует Claude
      - ./workspace:/app/workspace

      # Credentials claude.ai подписки (если не используешь API ключ)
      # Монтируем только файл credentials, не всю папку — чтобы не затереть settings.json
      - ${CLAUDE_CREDENTIALS_PATH:-~/.claude}/.credentials.json:/home/botuser/.claude/.credentials.json:ro

    # Если используешь API ключ вместо подписки — credentials не нужны,
    # просто закомментируй строку выше и добавь в .env:
    # ANTHROPIC_API_KEY=sk-ant-...
